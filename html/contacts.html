<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="../assets/icons/Join_dark.png" type="image/png">
    <title>Contacts</title>

    <link rel="stylesheet" href="../styles/standards.css">
    <link rel="stylesheet" href="../styles/media_queries.css">
    <link rel="stylesheet" href="../styles/fonts.css">
    <link rel="stylesheet" href="../styles/contacts.css">

    <script src="../scripts/global.js" defer></script>
    <script src="../scripts/global_keyboard.js" defer></script>
    <script src="../scripts/contacts.js" defer></script>
    <script src="../scripts/contacts_dialogs.js" defer></script>
    <script src="../scripts/templates.js" defer></script>
    <script src="../scripts/rendering.js" defer></script>
</head>

<body onload="init()">
    <nav role="navigation" aria-label="Main navigation">
        <div class="sidenav">
            <div class="nav_icon">
                <img src="../assets/icons/Join_light.png" alt="Join Logo" aria-hidden="true">
            </div>
            <section class="menu">
                <div class="nav_navigation">
                    <a class="nav_summary" href="./summary.html" aria-label="Go to Summary page">
                        <img src="../assets/icons/Prop_summary.svg" height="30px" width="30px" alt=""
                            aria-hidden="true">
                        <p class="nav_p">Summary</p>
                    </a>
                    <a class="nav_add_task" href="./add_task.html" aria-label="Go to Add Task page">
                        <img src="../assets/icons/Prop_add_task.svg" height="30px" width="30px" alt=""
                            aria-hidden="true">
                        <p class="nav_p">Add Task</p>
                    </a>
                    <a class="nav_board" href="./board.html" aria-label="Go to Board page">
                        <img src="../assets/icons/Prop_board.svg" height="30px" width="30px" alt="" aria-hidden="true">
                        <p class="nav_p">Board</p>
                    </a>
                    <a class="nav_contacts active" href="./contacts.html" aria-current="page"
                        aria-label="Contacts page - currently selected">
                        <img src="../assets/icons/Prop_contacts.svg" height="30px" width="30px" alt=""
                            aria-hidden="true">
                        <p class="nav_p">Contacts</p>
                    </a>
                </div>

                <div class="nav_policy">
                    <a class="privacy_policy" href="./privacy_policy.html" aria-label="Read our privacy policy">Privacy
                        Policy</a>
                    <a class="legal_notes" href="./legal_notice.html" aria-label="Read our legal notice">Legal
                        notice</a>
                </div>
            </section>
        </div>
    </nav>

    <header role="banner">
        <div class="header_content">
            <div class="header-left">
                <h2 class="header_h2">Kanban Project Management Tool</h2>
                <img class="header-left-img" src="../assets/icons/Join_dark.png" alt="Join Logo" aria-hidden="true">
            </div>
            <div class="header-right">
                <a class="a_help_summary" href="./help.html" aria-label="Get help and support">
                    <img class="help-icon" src="../assets/icons/help_icon.svg" alt="" aria-hidden="true">
                </a>
                <div class="user-circle" onclick="toggleDropDownMenu()" id="currentUserInitials" tabindex="0"
                    role="button" aria-expanded="false" aria-haspopup="menu" aria-label="User menu"
                    aria-controls="user-menu" onkeydown="handleUserMenuKeydown(event)">
                </div>

                <div class="user-menu" id="user-menu" role="menu" aria-hidden="true">
                    <a class="user-menu-help" href="./help.html" role="menuitem">Help</a>
                    <a class="user-menu-legal-notice" href="./legal_notice.html" role="menuitem">Legal Notice</a>
                    <a class="user-menu-privacy-policy" href="./privacy_policy.html" role="menuitem">Privacy Policy</a>
                    <a class="user-menu-logout" href="../index.html" id="logout-btn" onclick="logout()" role="menuitem">
                        Log out
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="contacts-wrapper" role="main">
        <aside class="contact-list-sidebar-outer" role="complementary" aria-label="Contact list and actions">

            <div class="button_add_contact">
                <button id="add-contact-btn-mobile" class="add-contact-btn-mobile"
                    onclick="showDialogCreateContact('contactAddModal', event)" type="button"
                    aria-label="Add new contact">
                    <span class="add-contact-icon-mobile" aria-hidden="true">
                        <span class="add-contact-icon-mobile">
                            <img src="../assets/icons/person_add.svg" alt="">
                        </span>
                    </span>
                </button>

                <button id="add-contact-btn" class="add-contact-btn"
                    onclick="showDialogCreateContact('contactAddModal', event)" type="button"
                    aria-label="Add new contact">
                    Add new contact
                    <span class="add-contact-icon" aria-hidden="true">
                        <span class="add-contact-icon-mobile">
                            <img src="../assets/icons/person_add.svg" alt="">
                        </span>
                    </span>
                </button>
            </div>

            <div id="contactList" role="list" aria-label="Contact list"></div>
        </aside>

        <section class="flex column">
            <article class="main_title">
                <div class="tile_summary">
                    <h1 class="h1_title_summary">Contacts</h1>
                </div>

                <div class="title_seperator" aria-hidden="true">
                    <img src="../assets/icons/Summary_title_seperator.svg" height="59px" width="3px" alt="">
                </div>

                <div class="title_summary_discription">
                    <p class="title_discription">Better with a team</p>
                </div>
            </article>

            <article id="contactDisplayLarge" class="contact-large" style="display: none;" role="region"
                aria-label="Contact details" aria-live="polite">
            </article>

            <dialog id="contactAddModal" class="contact-dialog-desktop" role="dialog" aria-modal="true"
                aria-labelledby="contact-dialog-h2"></dialog>

            <dialog id="contactEditDeleteModal" class="contact-dialog-desktop" role="dialog" aria-modal="true"
                aria-labelledby="edit-contact-dialog-h2"></dialog>
        </section>
    </main>

    <div id="rotateInfoOverlay">
        <div class="rotate-box">
            <img src="../assets/icons/rotate_phone.png" alt="rotate-phone" class="rotate-phone">
            <p>Please rotate your Phone</p>
        </div>
    </div>

</body>

</html>
